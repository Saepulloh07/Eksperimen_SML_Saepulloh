name: Automated Data Preprocessing

# ---------------------------------------------------------------------------
# Workflow ini menjalankan preprocessing.nama-siswa.py secara otomatis setiap
# kali ada perubahan pada data mentah atau script preprocessing, dan bisa
# juga dijalankan manual lewat tab "Actions" (workflow_dispatch).
# Hasil preprocessing terbaru akan otomatis di-commit kembali ke repository
# di folder preprocessing/namadataset_preprocessing/.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [ main ]
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_Saepulloh.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch: {}
  schedule:
    # Opsional: jalan otomatis tiap awal bulan jam 00:00 UTC.
    # Hapus/ubah sesuai kebutuhan.
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automated preprocessing
        run: |
          python preprocessing/automate_Saepulloh.py \
            --raw_dir namadataset_raw \
            --output_dir preprocessing/namadataset_preprocessing

      - name: Commit & push preprocessed dataset (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/namadataset_preprocessing
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan pada hasil preprocessing."
          else
            git commit -m "chore: auto-update preprocessed dataset [skip ci]"
            git push
          fi

      - name: Upload preprocessing output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/namadataset_preprocessing/
          retention-days: 30
