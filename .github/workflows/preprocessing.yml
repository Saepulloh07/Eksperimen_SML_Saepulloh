name: Automated Data Preprocessing

on:
  push:
    branches: [ main ]
    paths:
      # Terpantik hanya jika ada update pada file data terenkripsi atau script
      - 'keuangan_raw/*.gpg' 
      - 'preprocessing/automate_Saepulloh.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '0 0 1 * *'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas openpyxl scikit-learn numpy

      # STEP BARU: Dekripsi file sensitif secara lokal di dalam runner
      - name: Decrypt Sensitive Excel Files
        env:
          GPG_PASSPHRASE: ${{ secrets.DATA_PASSPHRASE }}
        run: |
          # Asumsi file .gpg sudah di-push ke folder keuangan_raw/
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output keuangan_raw/"ARUS KAS 2026.xlsx" keuangan_raw/"ARUS KAS 2026.xlsx.gpg" || echo "File ARUS KAS tidak ditemukan"
          
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output keuangan_raw/"Laporan kasir.xlsx" keuangan_raw/"Laporan kasir.xlsx.gpg" || echo "File Laporan kasir tidak ditemukan"

      - name: Run automated preprocessing
        run: |
          # Pastikan script Anda membaca dari keuangan_raw dan menyimpan ke keuangan_preprocessing
          python preprocessing/automate_Saepulloh.py \
            --raw_dir keuangan_raw \
            --output_dir preprocessing/keuangan_preprocessing

      # STEP DIUBAH: Hapus Git Commit/Push, langsung gunakan Artifact
      - name: Upload preprocessing output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/keuangan_preprocessing/
          retention-days: 7 # Diturunkan ke 7 hari demi keamanan data keuangan
