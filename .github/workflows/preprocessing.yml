name: Automated Data Preprocessing

on:
  push:
    branches: [ main ]
    paths:
      # Terpantik hanya jika ada update pada file data terenkripsi atau script
      - 'keuangan_raw/*.gpg' 
      - 'preprocessing/automate_Saepulloh.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch: {}
  schedule:
    - cron: '0 0 1 * *'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas openpyxl scikit-learn numpy

      # STEP BARU: Dekripsi file sensitif secara lokal di dalam runner
      - name: Decrypt Sensitive Excel Files
        env:
          GPG_PASSPHRASE: ${{ secrets.DATA_PASSPHRASE }}
        run: |
          # Hapus '|| echo' agar jika gagal, Actions langsung berhenti dan memberi tahu alasannya
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output "keuangan_raw/ARUS KAS 2026.xlsx" "keuangan_raw/ARUS KAS 2026.xlsx.gpg"
          
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output "keuangan_raw/Laporan kasir.xlsx" "keuangan_raw/Laporan kasir.xlsx.gpg"
          
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output "keuangan_raw/data sistem 1 - 31 mei.xlsx" "keuangan_raw/data sistem 1 - 31 mei.xlsx.gpg"

      # STEP DEBUGGING BARU: Melihat isi folder aktual di dalam server GitHub
      - name: Debug Output Folder Keuangan
        run: |
          echo "Daftar file di dalam folder keuangan_raw saat ini:"
          ls -la keuangan_raw/

      - name: Run automated preprocessing
        run: |
          python preprocessing/automate_Saepulloh.py \
            --raw_dir keuangan_raw \
            --output_dir preprocessing/keuangan_preprocessing

      # STEP DIUBAH: Hapus Git Commit/Push, langsung gunakan Artifact
      - name: Upload preprocessing output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/keuangan_preprocessing/
          retention-days: 7 # Diturunkan ke 7 hari demi keamanan data keuangan
